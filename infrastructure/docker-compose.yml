services:
  db:
    image: postgres:15-alpine
    container_name: appointment-database
    env_file:
      - ../backend/.env
    ports:
      - "5433:5432"
    volumes:
      - ./k8s/sql:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  spring-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: appointment-backend
    env_file:
      - ../backend/.env
    environment:
      DB_HOST: db
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: appointment-frontend
    ports:
      - "3000:80"
    depends_on:
      - spring-backend
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

volumes:
  pgdata:

networks:
  backend-net:
    driver: bridge
    internal: false
